name: Release on Tag Push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform-tools
        shell: pwsh
        run: |
          $licenses = @('y','y','y','y','y','y','y','y','y','y') -join [Environment]::NewLine
          $licenses | sdkmanager --licenses | Out-Null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Restore phone bridge signing key
        shell: pwsh
        env:
          PHONEBRIDGE_KEYSTORE_BASE64: ${{ secrets.PHONEBRIDGE_KEYSTORE_BASE64 }}
        run: |
          if (-not $env:PHONEBRIDGE_KEYSTORE_BASE64) {
            throw "PHONEBRIDGE_KEYSTORE_BASE64 secret is not configured."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'phonebridge-release.keystore'
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:PHONEBRIDGE_KEYSTORE_BASE64))
          "PHONEBRIDGE_KEYSTORE_FILE=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build one-click EXE
        shell: pwsh
        run: |
          ./tools/publish-shuttermute-exe.ps1

      - name: Build phone-to-phone APK
        shell: pwsh
        env:
          PHONEBRIDGE_KEYSTORE_PASSWORD: android
          PHONEBRIDGE_KEY_ALIAS: androiddebugkey
          PHONEBRIDGE_KEY_PASSWORD: android
        run: |
          ./tools/publish-phonebridge-apk.ps1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: .github/release-notes.md
          files: |
            build/shuttermute-exe/ShutterMute.exe
            build/phonebridge-apk/ShutterMute-PhoneBridge.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
